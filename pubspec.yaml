name: genset_asset_management
description: A new Flutter project for the GENSET Asset Management System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  barcode: ^2.2.3
  qr: ^3.0.1
  image_picker: ^1.0.7
  mobile_scanner: ^6.0.0
  supabase_flutter: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_sulsel.png
    - assets/bg_empowerment.png
    - assets/logo_dp3a.png
    - assets/logo_sulsel_transparent.png
